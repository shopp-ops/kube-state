apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.15.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    controller:
      # Required for ingress to work on kind — binds directly to the node's host ports
      hostPort:
        enabled: true
      service:
        type: NodePort
      nodeSelector:
        ingress-ready: "true"
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Equal"
          effect: "NoSchedule"
      # Edge metrics (true response time, request totals, response size) for
      # spec §4.1's web-traffic panels. Prometheus is configured for
      # cross-namespace ServiceMonitor discovery (kube-prometheus-stack.yaml),
      # so no extra namespace selector is needed here.
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
