apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: community-operator
  namespace: mongodb
spec:
  interval: 30m
  chart:
    spec:
      chart: community-operator
      version: "0.13.0"
      sourceRef:
        kind: HelmRepository
        name: mongodb
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    operator:
      # Watch all namespaces so per-shop MongoDBCommunity CRs are reconciled anywhere
      watchNamespace: "*"
