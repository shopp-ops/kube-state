apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-loki-tempo
  namespace: observability
  labels:
    # Picked up by the kube-prometheus-stack Grafana datasource sidecar.
    grafana_datasource: "1"
data:
  loki-tempo-datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.observability.svc:3100
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        # Tempo's Service exposes no :3100 — its HTTP query API listens on
        # :3200 (chart names the port "tempo-prom-metrics", but it's Tempo's
        # main http_listen_port, serving both /api/* and /metrics).
        url: http://tempo.observability.svc:3200
