apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 30m
  dependsOn:
    - name: prometheus-operator-crds
      namespace: observability
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.5.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    # CRDs are owned by the prometheus-operator-crds release above.
    crds:
      enabled: false
    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 24h
        # emptyDir (no storageSpec) — dev cluster, no PVC.
        resources:
          requests:
            cpu: 100m
            memory: 400Mi
          limits:
            memory: 1Gi
        # Cross-namespace discovery: pick up per-shop ServiceMonitors/Rules.
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        ruleSelectorNilUsesHelmValues: false
        ruleSelector: {}
        ruleNamespaceSelector: {}
    alertmanager:
      alertmanagerSpec:
        replicas: 1
        # Pick up per-shop AlertmanagerConfig objects in any namespace.
        alertmanagerConfigSelector: {}
        alertmanagerConfigNamespaceSelector: {}
        # Mount the shared cluster channel's webhook Secret (created by the
        # operator from the cluster-alerts DiscordChannel) at
        # /etc/alertmanager/secrets/discord-cluster-alerts/. Alertmanager stays
        # in ContainerCreating until this Secret exists, then starts.
        secrets:
          - discord-cluster-alerts
      # Global routing tree (base/default route). Per-shop AlertmanagerConfig CRs
      # are grafted underneath as namespace-scoped child routes; anything that
      # matches no shop falls through to the default receiver = shared channel.
      config:
        route:
          receiver: cluster-discord
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            # Watchdog fires constantly by design; drop it.
            - receiver: "null"
              matchers:
                - alertname = "Watchdog"
        receivers:
          - name: "null"
          - name: cluster-discord
            discord_configs:
              - webhook_url_file: /etc/alertmanager/secrets/discord-cluster-alerts/webhook-url
    grafana:
      # LOCAL ONLY — swap to admin.existingSecret for anything shared.
      adminPassword: admin
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          label: grafana_dashboard
        datasources:
          enabled: true
          searchNamespace: ALL
          label: grafana_datasource
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.local
