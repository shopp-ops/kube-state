apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 30m
  dependsOn:
    - name: prometheus-operator-crds
      namespace: observability
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.5.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    # CRDs are owned by the prometheus-operator-crds release above.
    crds:
      enabled: false
    # Explicit (matches chart 87.5.1's own default) so a future chart upgrade
    # can't silently drop cluster CPU/RAM/FS/network alarms — verified via
    # `helm show values kube-prometheus-stack --version 87.5.1` that this
    # enables the node, kubernetesResources, kubeStateMetrics, and network
    # rule groups.
    defaultRules:
      create: true
    # Rendered by this release (which dependsOn prometheus-operator-crds), so the
    # PrometheusRule CRD is guaranteed present before the rule is applied — unlike
    # a raw CR in the root Kustomization, which races the CRD on a fresh bootstrap.
    additionalPrometheusRulesMap:
      shopops-rules:
        groups:
          - name: shopops.rules
            rules:
              # A shop API scrape target is down. The `namespace` label is
              # preserved from the target, so this alert routes to that shop's
              # Discord channel via the shop's AlertmanagerConfig. Non-shop
              # targets fall through to the shared cluster channel.
              - alert: ShopApiDown
                expr: up{endpoint="http"} == 0
                for: 2m
                labels:
                  severity: critical
                annotations:
                  summary: "Shop API target down in {{ $labels.namespace }}"
                  description: "The API endpoint {{ $labels.namespace }}/{{ $labels.service }} has been unreachable for 2m."
              # kube-prometheus-stack defaultRules already ship node/pod/kubernetes
              # alerts; those carry a `namespace` label too, so pod-level failures
              # in a shop namespace also reach that shop's channel automatically.
    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 24h
        # emptyDir (no storageSpec) — dev cluster, no PVC.
        resources:
          requests:
            cpu: 100m
            memory: 400Mi
          limits:
            memory: 1Gi
        # Cross-namespace discovery: pick up per-shop ServiceMonitors/Rules.
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        ruleSelectorNilUsesHelmValues: false
        ruleSelector: {}
        ruleNamespaceSelector: {}
    alertmanager:
      alertmanagerSpec:
        replicas: 1
        # Pick up per-shop AlertmanagerConfig objects in any namespace.
        alertmanagerConfigSelector: {}
        alertmanagerConfigNamespaceSelector: {}
        # Mount the shared cluster channel's webhook Secret (created by the
        # operator from the cluster-alerts DiscordChannel) at
        # /etc/alertmanager/secrets/discord-cluster-alerts/. Alertmanager stays
        # in ContainerCreating until this Secret exists, then starts.
        secrets:
          - discord-cluster-alerts
      # Global routing tree (base/default route). Per-shop AlertmanagerConfig CRs
      # are grafted underneath as namespace-scoped child routes; anything that
      # matches no shop falls through to the default receiver = shared channel.
      config:
        route:
          receiver: cluster-discord
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            # Watchdog fires constantly by design; drop it.
            - receiver: "null"
              matchers:
                - alertname = "Watchdog"
        receivers:
          - name: "null"
          - name: cluster-discord
            discord_configs:
              - webhook_url_file: /etc/alertmanager/secrets/discord-cluster-alerts/webhook-url
    grafana:
      # LOCAL ONLY — swap to admin.existingSecret for anything shared.
      adminPassword: admin
      sidecar:
        # shop gets its own file (and its own dashboard).
        enableUniqueFilenames: true
        dashboards:
          enabled: true
          searchNamespace: ALL
          label: grafana_dashboard
        datasources:
          enabled: true
          searchNamespace: ALL
          label: grafana_datasource
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.local
