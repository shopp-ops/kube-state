apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-operator-crds
      version: "30.0.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  # The kube-prometheus-stack CRDs are too large for Helm's annotation limit,
  # so they are installed here separately and disabled in the stack itself.
