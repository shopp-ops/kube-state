apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: tempo
      version: "1.24.4"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    # Monolithic single-binary Tempo with local storage — dev profile.
    persistence:
      enabled: false
    tempo:
      retention: 24h
      storage:
        trace:
          backend: local
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      # Metrics-generator with the local-blocks processor.
      metricsGenerator:
        enabled: true
        processor:
          local_blocks:
            filter_server_spans: false
            flush_to_storage: true
        storage:
          path: /tmp/tempo/generator/wal
        traces_storage:
          path: /tmp/tempo/generator/traces
      # The generator only runs a processor for a tenant if that tenant's
      # overrides list it. This turns local-blocks on for the default tenant.
      overrides:
        defaults:
          metrics_generator:
            processors:
              - local-blocks
