apiVersion: v1
kind: Namespace
metadata:
  name: shop-operator-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shop-operator
  namespace: shop-operator-system
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: shop-operator
    namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: shop-operator-values   # override block from values.yaml in this dir
