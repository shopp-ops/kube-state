apiVersion: v1
kind: Namespace
metadata:
  name: shophub
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shophub
  namespace: shophub
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: shophub
    namespace: flux-system
  dependsOn:
    - name: shop-operator      # CRDs (Shop, Wallet, DiscordChannel) must exist first
      namespace: shop-operator-system
    - name: cloudnative-pg     # ships a CNPG Cluster CR; needs the operator ready
      namespace: cnpg-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: shophub-values     # non-secret overrides (this dir's values.yaml)
    - kind: Secret
      name: shophub-secrets    # api.jwtSecret + database.password (NOT in git)
