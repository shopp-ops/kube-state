apiVersion: v1
kind: ConfigMap
metadata:
  name: shophub-values
  namespace: shophub
data:
  values.yaml: |
    api:
      replicaCount: 1
      image:
        repository: ghcr.io/shopp-ops/shophub-api
        tag: "1.1.1"
      baseUrl: "http://shophub.local/api"   # CORS_ORIGIN
      nodeEnv: "production"
      # Images the operator stamps onto every Shop CR.
      shopApiImage: "ghcr.io/shopp-ops/shop-api:1.1.0"
      shopWebImage: "ghcr.io/shopp-ops/shop-web:1.1.0"
      # Per-shop ingress host suffix: shophub.<name>-<id>.<suffix>.
      # sslip.io resolves every shop to localhost with no /etc/hosts edits.
      shopHostSuffix: "127.0.0.1.sslip.io"
    web:
      replicaCount: 1
      image:
        repository: ghcr.io/shopp-ops/shophub-web
        tag: "1.1.1"
      baseUrl: "http://shophub.local"
      nodeEnv: "production"
    ingress:
      enabled: true
      className: nginx
      host: shophub.local
    database:
      clusterName: shophub-db
      name: shophub
      username: shophub
      storage: 1Gi
      instances: 1
      # password is set from the shophub-secrets Secret, not here.
    serviceAccount:
      create: true
    rbac:
      create: true
    metrics:
      serviceMonitor:
        enabled: true
    otel:
      enabled: true
      endpoint: "http://alloy.observability.svc:4318"
      serviceName: "shophub-api"
